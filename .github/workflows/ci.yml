name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            compiler: apple-clang
            cc: clang
            cxx: clang++
          # Ubuntu legs temporarily disabled pending libstdc++ portability work.
          # The interpreter compiles and passes all tests on macOS (Apple Clang 17 /
          # libc++).  Linux support will be restored on a dedicated Ubuntu box once
          # the missing-header issues with libstdc++ are fully diagnosed.
          #
          # - os: ubuntu-24.04
          #   compiler: gcc-14
          #   cc: gcc-14
          #   cxx: g++-14
          # - os: ubuntu-24.04
          #   compiler: clang-18
          #   cc: clang-18
          #   cxx: clang++-18

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure (Release)
        run: |
          cmake -S cxx -B cxx/build_ci \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=${{ matrix.cc }} \
                -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build cxx/build_ci --parallel

      - name: Test
        working-directory: cxx
        run: ctest --test-dir build_ci --output-on-failure --parallel 4
        timeout-minutes: 5
